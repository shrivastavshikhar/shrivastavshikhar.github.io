- title: "Normative Personal Assistants: Bayesian Inference in LLM Agents for better Recommendations"
  keywords: "Machine Learning, Bayesian Inference, LLMs, Recommender Systems"
  abstract: "The last couple of years have witnessed widespread deployment and aggressive adoption of Large Language Models (LLMs) based Artificial Intelligence (AI) agents in the society. These agents interact with human users in varying world settings and personas, often coupled with incomplete information. In order to do this effectively, they must learn to create representations of the world they operate in, understand how humans behave and maintain reliable probability or belief estimates about them. While good at single-turn, natural language based instruction-following tasks, it remains unclear how well these agents perform in a sparse data, multi-turn interaction setting for inference based tasks. Specifically, using a personalized recommendation task, where the agent infers user’s latent preferences based on observed behavior over multiple interactions, we show that performance of off-the-shelf (OTS) instruction-tuned LLMs remains invariably low. We present a Bayesian inference based Supervised Fine-Tuning (SFT) strategy, that improves the performance of the models significantly providing better recommendations. Furthermore, we show that models of varying sizes exhibit contrasting degree of learning ability."

- title: "Identification & Mitigation of Dataset Artifacts for Textual Entailment"
  keywords: "Natural Language Processing, Natural Language Inference"
  abstract: "In the context of Natural Language Processing, the current state-of-the-art (SOTA) models perform very well on benchmark datasets. However, it has been shown that such models learn dataset biases or spurious correlations which cause them to perform poorly on real-world data of interest. This work studies the existence, identification and mitigation steps of such artifacts in the context of Natural Language Inference (NLI), the task of determining whether one sentence (the premise) entails, contradicts or is logically unrelated to another (the hypothesis). Concretely, we use ELECTRA, a pretrained transformer-based foundational model, fine-tuned on MultiNLI (MLNI) dataset, and examine the robustness of the model in varying adversarial settings. Our analysis reveals higher susceptibility of the model to complex syntactic structures in the data. We also observe models of varying sizes exhibit contrasting degree of immunity to adversarial datasets. We suggest corrective improvement steps for specific error types backed by empirical evidence."